# Mosquitto config for the docker-compose dev stack.
#
# This is the LAN-only development listener: anonymous, bound to the compose
# internal network, exposed on the host only via 127.0.0.1 (see compose
# ports mapping). Do NOT use this config in production -- for real camera
# firmware connectivity with TLS + mTLS + auth, run server/certs/generate-
# all.sh and server/certs/install-broker.sh on a bare-metal mosquitto.
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout
