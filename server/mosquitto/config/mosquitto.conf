# Mosquitto config for the Docker stack.
#
# Two listeners run side-by-side:
#   :1883 — plain, anonymous. LAN-accessible. For local tests and
#           backward compatibility with legacy/anonymous clients.
#   :8883 — TLS + mTLS + username/password. The AMB82 firmware and the
#           recorder service both connect here in production.
#
# All paths below refer to container paths; docker-compose.yml maps them
# back to ./mosquitto/... and ./certs/out/... on the host.

# Required to let the two listeners have different authentication
# settings (1883 = anonymous, 8883 = require password + client cert).
per_listener_settings true

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ---------------- Plain, anonymous (LAN) -----------------
# Bound to 0.0.0.0 inside the container; docker-compose.yml maps
# 1883:1883 on the host.
listener 1883 0.0.0.0
allow_anonymous true

# ---------------- TLS + mTLS + password ------------------
# Bound to 0.0.0.0 inside the container; docker-compose.yml maps
# 8883:8883 on the host.
listener 8883 0.0.0.0
allow_anonymous false
password_file /mosquitto/certs/passwd
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate      true
use_identity_as_username false
