# ============================================================
# Automation: New Video Clip Notification
# ============================================================
- id: camera_new_clip_notification
  alias: "Camera: New Video Clip"
  trigger:
    - platform: mqtt
      topic: "camera/amb82_cam_01/clip"
  action:
    - service: notify.notify
      data:
        title: "Motion Detected — New Clip"
        message: >
          Camera {{ trigger.payload_json.device }} recorded a
          {{ trigger.payload_json.duration_s }}s clip.
          File: {{ trigger.payload_json.filename }}
          Battery: {{ trigger.payload_json.battery_pct }}%

# ============================================================
# Automation: Low Battery Alert
# ============================================================
- id: camera_low_battery_alert
  alias: "Camera: Low Battery Alert"
  trigger:
    - platform: mqtt
      topic: "camera/amb82_cam_01/battery"
  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.alert in ['LOW', 'CRITICAL'] }}
  action:
    - service: notify.notify
      data:
        title: "Camera Battery {{ trigger.payload_json.alert }}"
        message: >
          {{ trigger.payload_json.device }} battery is at
          {{ trigger.payload_json.battery_pct }}%
          ({{ trigger.payload_json.battery_v }}V).
          {{ 'Charge immediately!' if trigger.payload_json.alert == 'CRITICAL' else 'Consider charging soon.' }}

# ============================================================
# Automation: Camera Offline Alert
# ============================================================
- id: camera_offline_alert
  alias: "Camera: Offline Alert"
  trigger:
    - platform: mqtt
      topic: "camera/amb82_cam_01/availability"
      payload: "offline"
  action:
    - service: notify.notify
      data:
        title: "Camera Offline"
        message: "Camera amb82_cam_01 has gone offline. Check battery or WiFi connection."
