# Production-capable Docker stack for the AMB82 recorder pipeline.
#
# Listeners (see mosquitto/config/mosquitto.conf):
#   1883 — plain, anonymous, LAN-accessible (legacy/test clients)
#   8883 — TLS + mTLS + username/password (the AMB82 firmware + recorder)
#
# Cert / key files live under ./certs/out/ (generated by
# ./certs/generate-all.sh on the host -- gitignored). Each container
# mounts only the files it needs, never the CA private key.
#
# Service / uid note: both mosquitto and recorder run as uid 1000 so
# the host-owned cert + config files (mode 600, owner uid 1000) are
# readable from inside the containers without chmod gymnastics.
#
# The recorder password comes from server/.env (also gitignored).

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    init: true
    # Match host uid so the bind-mounted certs/config are readable and
    # data/log are writable. mosquitto doesn't need any extra
    # privileges; ports > 1024 don't require root.
    user: "1000:1000"
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      # Certificates and password file mounted individually (read-only).
      # We deliberately do NOT mount the whole ./certs/out directory so
      # ca.key never ends up visible inside the container.
      - ./certs/out/ca.crt:/mosquitto/certs/ca.crt:ro
      - ./certs/out/server.crt:/mosquitto/certs/server.crt:ro
      - ./certs/out/server.key:/mosquitto/certs/server.key:ro
      - ./certs/out/passwd:/mosquitto/certs/passwd:ro
    healthcheck:
      # Probe the plain listener inside the container. mosquitto_sub is
      # shipped with the eclipse-mosquitto image.
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/#' -C 1 -W 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  recorder:
    build: ./recorder
    container_name: recorder
    restart: unless-stopped
    init: true
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      # Connect to the secure listener via the compose service name.
      # The server cert SAN includes "mosquitto" for exactly this.
      MQTT_BROKER: mosquitto
      MQTT_PORT: "8883"
      MQTT_TLS: "1"
      MQTT_USER: "recorder"
      # Sourced from server/.env (gitignored). Empty string is an error
      # and recorder.py will fail mTLS handshake -- that's the intent.
      MQTT_PASS: "${MQTT_RECORDER_PASSWORD:?set MQTT_RECORDER_PASSWORD in server/.env}"
      MQTT_CA_CERT: /certs/ca.crt
      MQTT_CLIENT_CERT: /certs/client_recorder.crt
      MQTT_CLIENT_KEY: /certs/client_recorder.key
      MQTT_TOPIC: "camera/+/motion"
      CLIPS_DIR: /clips
      MAX_DURATION: "300"
      RTSP_TIMEOUT_US: "5000000"
      MIN_CLIP_BYTES: "4096"
      TZ: "Europe/Sofia"
    volumes:
      # Clips land directly on the host filesystem. Host dir must be
      # owned by uid 1000 (stanimir) so the container can write.
      - /home/stanimir/amb82_clips:/clips
      # Recorder sees only the three PEM files it needs.
      - ./certs/out/ca.crt:/certs/ca.crt:ro
      - ./certs/out/client_recorder.crt:/certs/client_recorder.crt:ro
      - ./certs/out/client_recorder.key:/certs/client_recorder.key:ro

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./homeassistant:/config
    environment:
      - TZ=UTC
