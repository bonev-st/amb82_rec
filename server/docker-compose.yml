version: "3.8"

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # MQTT-triggered FFmpeg recorder
  recorder:
    build: ./recorder
    container_name: recorder
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      MQTT_USER: ""              # Set if broker requires auth
      MQTT_PASS: ""
      MQTT_TOPIC: "camera/+/motion"
      CLIPS_DIR: /clips
      MAX_DURATION: "300"        # Safety cap: 5 minutes max per clip
    volumes:
      - ./clips:/clips

  # Home Assistant (optional — comment out if using existing instance)
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./homeassistant:/config
    environment:
      - TZ=UTC
